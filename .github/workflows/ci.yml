name: CI

on:
  push:
    branches:
      - main
      - dev
      - feat/**
      - feature/**
      - docs/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      JWT_SECRET: ci-secret
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tests and build
        run: npm run ci
